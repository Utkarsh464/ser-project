{% extends "base.html" %}
{% block title %}Register — VoiceSense{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#4f8bff,#00d4ff);font-size:26px;margin-bottom:16px;box-shadow:0 8px 32px rgba(79,139,255,0.4);">🎤</div>
      <div class="auth-title">Create account</div>
      <div class="auth-sub">Start analyzing your emotions with AI</div>
    </div>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="Choose a username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="Min. 6 characters" required>
      </div>
      <div class="form-group" style="margin-bottom:28px;">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-input" placeholder="Repeat your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;">
        <i class="bi bi-person-plus-fill"></i> Create Account
      </button>
    </form>
    <div style="text-align:center;margin-top:24px;font-size:13px;color:var(--text2);">
      Already have an account?
      <a href="{{ url_for('login') }}" style="color:var(--blue);font-weight:600;text-decoration:none;"> Sign in →</a>
    </div>
  </div>
</div>
{% endblock %}
