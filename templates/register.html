{% extends "base.html" %}
{% block title %}Register — VoiceSense{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="display:inline-flex;align-items:center;gap:10px;margin-bottom:12px;">
        <div style="width:12px;height:12px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);"></div>
        <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;">VoiceSense</span>
      </div>
      <p style="color:var(--muted);font-size:14px;">Create your account</p>
    </div>
    <form method="POST">
      <div style="margin-bottom:16px;">
        <label class="form-label-dark">Username</label>
        <input type="text" name="username" class="form-control-dark" placeholder="Choose a username" required>
      </div>
      <div style="margin-bottom:16px;">
        <label class="form-label-dark">Email</label>
        <input type="email" name="email" class="form-control-dark" placeholder="Your email address" required>
      </div>
      <div style="margin-bottom:16px;">
        <label class="form-label-dark">Password</label>
        <input type="password" name="password" class="form-control-dark" placeholder="Min. 6 characters" required>
      </div>
      <div style="margin-bottom:24px;">
        <label class="form-label-dark">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control-dark" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn-primary-glow" style="width:100%;">Create Account</button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--muted);">
      Already have an account? <a href="{{ url_for('login') }}" style="color:var(--accent);">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
