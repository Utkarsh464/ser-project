{% extends "base.html" %}
{% block title %}Login — VoiceSense{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="display:inline-flex;align-items:center;gap:10px;margin-bottom:12px;">
        <div style="width:12px;height:12px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);"></div>
        <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;">VoiceSense</span>
      </div>
      <p style="color:var(--muted);font-size:14px;">Sign in to your emotion analysis workspace</p>
    </div>
    <form method="POST">
      <div style="margin-bottom:18px;">
        <label class="form-label-dark">Username</label>
        <input type="text" name="username" class="form-control-dark" placeholder="Enter username" required>
      </div>
      <div style="margin-bottom:24px;">
        <label class="form-label-dark">Password</label>
        <input type="password" name="password" class="form-control-dark" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn-primary-glow" style="width:100%;">Sign In</button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:13px;color:var(--muted);">
      No account? <a href="{{ url_for('register') }}" style="color:var(--accent);">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
