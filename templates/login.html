{% extends "base.html" %}
{% block title %}Sign In — VoiceSense{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#4f8bff,#00d4ff);font-size:26px;margin-bottom:16px;box-shadow:0 8px 32px rgba(79,139,255,0.4);">🎤</div>
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to your VoiceSense account</div>
    </div>
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-input" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group" style="margin-bottom:28px;">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-input" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
    </form>
    <div style="text-align:center;margin-top:24px;font-size:13px;color:var(--text2);">
      Don't have an account?
      <a href="{{ url_for('register') }}" style="color:var(--blue);font-weight:600;text-decoration:none;"> Create one →</a>
    </div>
  </div>
</div>
{% endblock %}
